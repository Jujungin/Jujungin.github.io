<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Markdown Viewer</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

<style>

/* 전체 배경 */
body{
    background:#0d1117;
    margin:0;
    padding:40px;
    color:#c9d1d9;
    font-family: -apple-system,BlinkMacSystemFont,Segoe UI,Helvetica,Arial;
}

/* markdown 영역 */
.markdown-body{
    max-width:900px;
    margin:auto;
    background:#161b22;
    padding:50px;
    border-radius:12px;
    border:1px solid #30363d;
    color:#c9d1d9;
}

/* 제목 색 */
.markdown-body h1,
.markdown-body h2,
.markdown-body h3{
    color:#f0f6fc;
}

/* 링크 */
.markdown-body a{
    color:#58a6ff;
}

/* 코드 블록 */
.markdown-body pre{
    background:#0d1117;
    border:1px solid #30363d;
    border-radius:8px;
    padding:16px;
}

/* 인라인 코드 */
.markdown-body code{
    background:#21262d;
    padding:3px 6px;
    border-radius:6px;
}

/* 테이블 */
.markdown-body table{
    border-collapse:collapse;
}

.markdown-body th,
.markdown-body td{
    border:1px solid #30363d;
    padding:8px 12px;
}

</style>
</head>

<body>

<div id="content" class="markdown-body"></div>

<script>

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

if(file){
    fetch(`/source/${file}`)
    .then(res => res.text())
    .then(md => {
        document.getElementById("content").innerHTML = marked.parse(md);
    })
    .catch(()=>{
        document.getElementById("content").innerHTML="<h2>문서를 불러올 수 없습니다.</h2>"
    })
}

</script>

</body>
</html>
